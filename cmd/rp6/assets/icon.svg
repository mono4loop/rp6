<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <!-- brushed gunmetal rack face (matches components.RackPanel) -->
    <linearGradient id="rack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#424248"/>
      <stop offset="1" stop-color="#1C1C20"/>
    </linearGradient>
    <!-- top-lit gloss overlaid on each pad (convex sheen) -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- bottom shade overlaid on each pad (grounds it) -->
    <linearGradient id="shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.45" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.30"/>
    </linearGradient>
    <!-- soft colored halo so pads read as "lit" -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
    <filter id="glowHot" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4.8"/>
    </filter>
    <!-- a rack-panel corner screw -->
    <g id="screw">
      <circle r="6.5" fill="#28282C" stroke="#5C5C64" stroke-width="1.5"/>
      <line x1="-4" y1="0" x2="4" y2="0" stroke="#0E0E12" stroke-width="2"/>
    </g>
  </defs>

  <!-- rack face + beveled frame -->
  <rect width="128" height="128" rx="22" fill="url(#rack)"/>
  <rect x="1" y="1" width="126" height="126" rx="21" fill="none" stroke="#18181D" stroke-width="2"/>

  <!-- corner screws -->
  <use href="#screw" transform="translate(15,15)"/>
  <use href="#screw" transform="translate(113,15)"/>
  <use href="#screw" transform="translate(15,113)"/>
  <use href="#screw" transform="translate(113,113)"/>

  <!-- pad A (red) -->
  <rect x="10" y="30" width="30" height="30" rx="7" fill="#E14B4B" filter="url(#glow)" opacity="0.5"/>
  <rect x="10" y="30" width="30" height="30" rx="7" fill="#E14B4B"/>
  <rect x="10" y="30" width="30" height="30" rx="7" fill="url(#shade)"/>
  <rect x="10" y="30" width="30" height="30" rx="7" fill="url(#gloss)"/>

  <!-- pad B (orange) — the brand accent, glows a touch hotter -->
  <rect x="49" y="30" width="30" height="30" rx="7" fill="#E1873B" filter="url(#glowHot)" opacity="0.7"/>
  <rect x="49" y="30" width="30" height="30" rx="7" fill="#E1873B"/>
  <rect x="49" y="30" width="30" height="30" rx="7" fill="url(#shade)"/>
  <rect x="49" y="30" width="30" height="30" rx="7" fill="#ffffff" opacity="0.08"/>
  <rect x="49" y="30" width="30" height="30" rx="7" fill="url(#gloss)"/>

  <!-- pad C (gold) -->
  <rect x="88" y="30" width="30" height="30" rx="7" fill="#C9A227" filter="url(#glow)" opacity="0.5"/>
  <rect x="88" y="30" width="30" height="30" rx="7" fill="#C9A227"/>
  <rect x="88" y="30" width="30" height="30" rx="7" fill="url(#shade)"/>
  <rect x="88" y="30" width="30" height="30" rx="7" fill="url(#gloss)"/>

  <!-- pad D (green) -->
  <rect x="10" y="69" width="30" height="30" rx="7" fill="#4CAF50" filter="url(#glow)" opacity="0.5"/>
  <rect x="10" y="69" width="30" height="30" rx="7" fill="#4CAF50"/>
  <rect x="10" y="69" width="30" height="30" rx="7" fill="url(#shade)"/>
  <rect x="10" y="69" width="30" height="30" rx="7" fill="url(#gloss)"/>

  <!-- pad E (teal) -->
  <rect x="49" y="69" width="30" height="30" rx="7" fill="#26A69A" filter="url(#glow)" opacity="0.5"/>
  <rect x="49" y="69" width="30" height="30" rx="7" fill="#26A69A"/>
  <rect x="49" y="69" width="30" height="30" rx="7" fill="url(#shade)"/>
  <rect x="49" y="69" width="30" height="30" rx="7" fill="url(#gloss)"/>

  <!-- pad F (blue) -->
  <rect x="88" y="69" width="30" height="30" rx="7" fill="#4477DD" filter="url(#glow)" opacity="0.5"/>
  <rect x="88" y="69" width="30" height="30" rx="7" fill="#4477DD"/>
  <rect x="88" y="69" width="30" height="30" rx="7" fill="url(#shade)"/>
  <rect x="88" y="69" width="30" height="30" rx="7" fill="url(#gloss)"/>
</svg>
