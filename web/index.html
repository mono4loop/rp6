<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>RP6 — P-6 Pad Controller</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1c1c1c; }
    #loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
              color: #e1873b; font-family: sans-serif; font-size: 1rem; }
  </style>
  <script src="wasm_exec.js"></script>
</head>
<body>
  <div id="loader">Loading RP6…</div>
  <script>
    // Standard Go/Fyne WebAssembly bootstrap. Fyne's web driver creates its own
    // canvas on run. Audio starts on the first tap/keypress (browser autoplay
    // policy) — the Web Audio sink resumes the context on the first gesture.
    const go = new Go();
    WebAssembly.instantiateStreaming(fetch("rp6.wasm"), go.importObject)
      .then((result) => {
        document.getElementById("loader").remove();
        go.run(result.instance);
      })
      .catch((err) => {
        document.getElementById("loader").textContent = "Failed to load: " + err;
        console.error(err);
      });
  </script>
</body>
</html>
